# .github/workflows/cd.yml
# ─────────────────────────
# Continuous Deployment — triggered on every push to main.
#
# Pipeline:
#   1. Build & push backend image  → Artifact Registry
#   2. Deploy backend              → Cloud Run
#   3. Get backend URL
#   4. Build & push frontend image → Artifact Registry  (with backend URL baked in)
#   5. Deploy frontend             → Cloud Run
#   6. Update backend FRONTEND_URL → CORS whitelist
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID   — GCP project ID
#   GCP_SA_KEY       — GitHub Actions service account JSON key
#                      (created by Terraform: aida-github-actions SA)
#
# Everything else (API keys, Azure IDs) lives in Secret Manager —
# provisioned by Terraform and read directly by Cloud Run at runtime.

name: CD — Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  REGION:           asia-south1
  REGISTRY:         asia-south1-docker.pkg.dev
  BACKEND_SERVICE:  aida-backend
  FRONTEND_SERVICE: aida-frontend
  REGISTRY_REPO:    aida-registry

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # needed for Workload Identity (if used instead of SA key)

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Authenticate to GCP ───────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── 3. Build & push backend image ────────────────────────────────────────
      - name: Build backend image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/${{ env.BACKEND_SERVICE }}:latest \
            .

      - name: Push backend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/${{ env.BACKEND_SERVICE }}:latest

      # ── 4. Deploy backend ─────────────────────────────────────────────────────
      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image="${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --quiet

      # ── 5. Get backend URL ────────────────────────────────────────────────────
      - name: Get backend URL
        id: backend
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $URL"

      # ── 6. Build & push frontend image (with backend URL baked in) ────────────
      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ steps.backend.outputs.url }}" \
            --build-arg NEXT_PUBLIC_AZURE_CLIENT_ID="$(gcloud secrets versions access latest --secret=aida-azure-client-id)" \
            --build-arg NEXT_PUBLIC_AZURE_TENANT_ID="$(gcloud secrets versions access latest --secret=aida-azure-tenant-id)" \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/${{ env.FRONTEND_SERVICE }}:latest \
            ./frontend

      - name: Push frontend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/${{ env.FRONTEND_SERVICE }}:latest

      # ── 7. Deploy frontend ────────────────────────────────────────────────────
      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image="${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --quiet

      # ── 8. Get frontend URL ───────────────────────────────────────────────────
      - name: Get frontend URL
        id: frontend
        run: |
          URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Frontend URL: $URL"

      # ── 9. Update backend CORS with actual frontend URL ───────────────────────
      - name: Update backend FRONTEND_URL (CORS)
        run: |
          gcloud run services update ${{ env.BACKEND_SERVICE }} \
            --region=${{ env.REGION }} \
            --update-env-vars="FRONTEND_URL=${{ steps.frontend.outputs.url }}" \
            --quiet

      # ── 10. Summary ───────────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║           AIDA — Deployment Complete ✅              ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  Frontend : ${{ steps.frontend.outputs.url }}"
          echo "║  Backend  : ${{ steps.backend.outputs.url }}"
          echo "║  Commit   : ${{ github.sha }}"
          echo "╚══════════════════════════════════════════════════════╝"
          echo ""
          echo "Share this URL with users: ${{ steps.frontend.outputs.url }}"
