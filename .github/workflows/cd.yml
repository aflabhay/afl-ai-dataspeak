# .github/workflows/cd.yml
# ─────────────────────────
# Continuous Deployment pipeline.
# Triggers on merge to main branch only.
#
# Deploys to Google Cloud Run (backend) + Vercel (frontend).
# Adjust the deploy steps for your target platform.
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID          — your GCP project ID
#   GCP_SA_KEY              — service account JSON (base64 encoded)
#   OPENAI_API_KEY          — OpenAI API key
#   GCP_BIGQUERY_SA_KEY     — BigQuery service account JSON (base64)
#   VERCEL_TOKEN            — Vercel deploy token
#   VERCEL_ORG_ID           — Vercel org ID
#   VERCEL_PROJECT_ID       — Vercel project ID

name: CD — Deploy to Production

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: claude-bigquery-app
  GCP_REGION: asia-south1       # Mumbai — closest to Bengaluru
  CLOUD_RUN_SERVICE: bigquery-chat-api

jobs:
  deploy-backend:
    name: Deploy Backend → Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/apps/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/apps/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/apps/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/apps/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/apps/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=4000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars="NODE_ENV=production,AI_PROVIDER=openai,OPENAI_MODEL=gpt-4o-mini,GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GCP_DATASET=DCOE_Production,MAX_BQ_SCAN_GB=5" \
            --set-secrets="OPENAI_API_KEY=openai-api-key:latest,GOOGLE_APPLICATION_CREDENTIALS=bq-sa-key-path:latest"

      - name: Output Cloud Run URL
        run: |
          echo "✅ Backend deployed to:"
          gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --format="value(status.url)"

  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: |
          cd frontend
          vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --env NEXT_PUBLIC_API_URL=${{ env.API_URL }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          API_URL:           https://${{ env.CLOUD_RUN_SERVICE }}-${{ secrets.GCP_PROJECT_ID }}.run.app
