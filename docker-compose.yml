# docker-compose.yml
# ───────────────────
# Local development environment.
# Runs backend + frontend together with hot reload.
#
# Usage:
#   docker-compose up          — start both services
#   docker-compose up backend  — start backend only
#   docker-compose logs -f     — tail logs

version: '3.9'

services:
  backend:
    build:
      context: .
      target: deps           # use only the deps stage for dev speed
    command: node server.js
    ports:
      - '4000:4000'
    env_file:
      - .env
    environment:
      NODE_ENV: development
    volumes:
      - ./src:/app/src       # hot reload source changes
      - ./server.js:/app/server.js
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
    command: npm run dev
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    volumes:
      - ./frontend:/app
      - /app/node_modules    # preserve container node_modules
      - /app/.next           # preserve build cache
    depends_on:
      - backend
    restart: unless-stopped
